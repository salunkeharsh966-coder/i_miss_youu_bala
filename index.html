<!DOCTYPE html>
<html>
<head>
    <title>100 Smiles For You ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
        }

        h1 {
            margin-top: 80px;
            font-size: 40px;
        }

        p {
            font-size: 20px;
            width: 70%;
            margin: 20px auto;
        }

        #counter {
            font-size: 28px;
            margin: 20px;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: white;
            color: #ff4d6d;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4d6d;
            color: white;
            transform: scale(1.1);
        }

        .heart {
            position: absolute;
            top: -10px;
            font-size: 20px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>Aabha, I Owe You 100 Smiles 😔❤️</h1>

    <p>
        Kal meri wajah se tumhari aankhon me aansu the...  
        Aur us baat ka regret mujhe sabse zyada hai.  
        Ab se meri responsibility hai ki tumhe sirf smile du.  
        Main perfect nahi hu… but tumhare liye better banna chahta hu.
    </p>

    <div id="counter">Smiles Given: 0 / 100</div>

    <button onclick="addSmile()">Give One Smile ❤️</button>

    <script>
        let count = 0;

        function addSmile() {
            if (count < 100) {
                count++;
                document.getElementById("counter").innerText =
                "Smiles Given: " + count + " / 100";

                createHeart();
            }

            if (count == 100) {
                setTimeout(() => {
                    alert("100 Smiles Complete 🥺❤️ I Promise I’ll Never Make You Cry Again.");
                }, 300);
            }
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 500);
    </script>

</body>
</html>
