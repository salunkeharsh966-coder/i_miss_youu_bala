<!DOCTYPE html>
<html>
<head>
    <title>Please Forgive Me 🥺❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            overflow: hidden;
            color: white;
        }

        h1 {
            margin-top: 100px;
            font-size: 40px;
    
        }

        p {
            font-size: 20px;
            width: 70%;
            margin: 20px auto;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 20px;
            transition: 0.3s;
            position: relative;
        }

        #yesBtn {
            background: white;
            color: #ff4d6d;
            font-weight: bold;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background: #ff4d6d;
            color: white;
            position: absolute;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: float 4s linear forwards;
        }

        @keyframes float {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(-200px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>I Messed Up... 😔</h1>

    <p>
        Kal meri wajah se tum royi...  
        Aur mujhe us baat ka bohot regret hai.  
        Main perfect nahi hu, par tumhe hurt karna kabhi nahi chahta.  
        Please mujhe maaf kar do 🥺❤️
    </p>

    <button class="btn" id="yesBtn" onclick="forgive()">Forgive Me 🥺</button>
    <button class="btn" id="noBtn" onmouseover="moveButton()">No 😡</button>

    <script>
        const noBtn = document.getElementById("noBtn");

        function moveButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);

            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        function forgive() {
            alert("Yayyy 🥺❤️ Thank you for forgiving me. I promise I'll never make you cry again.");

            for (let i = 0; i < 20; i++) {
                createHeart();
            }
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.top = Math.random() * window.innerHeight + "px";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
    </script>

</body>
</html>
